# =============================================================================
# MODULAR / MULTI-TEAM TRACK  (serverless)  -- CONFIG-DRIVEN BRANCH
# =============================================================================
# The config decides, then the job BRANCHES. The standard family rides one shared
# for_each loop. Each structurally-different LME model gets its OWN branch off the
# job with its OWN dedicated pipeline + notebooks (no loop) -- matching what the
# team described (Alex: "the next path is also LME but completely different... we're
# not going to use the for each").
#
#   load_config_branched
#     ├─ has_standard?   ─true─▶ for_each(standard studies) ─▶ run_study_modular
#     ├─ has_lme_mixed?  ─true─▶ run_lme_mixed   (its own feature/matching/model notebooks)
#     └─ has_lme_growth? ─true─▶ run_lme_growth  (its own feature/matching/model notebooks)
#
# Add another odd-shaped model = add its rows to the config, a has_<family> flag in
# load_config_branched, a run_<family> job here, and one branch below. Add a standard
# model = a leaf notebook + a config row (no branch).
#
# Jobs:
#   setup_modular        -- one-time: registry config + single/multi-period data
#   run_study_modular    -- STANDARD per-study pipeline (dispatchers -> team-owned leaves)
#   run_lme_mixed        -- DEDICATED mixed-effects LME pipeline (own notebooks)
#   run_lme_growth       -- DEDICATED growth-curve LME pipeline (own notebooks)
#   eval_engine_modular  -- load_config -> branch into the loop + the LME workstreams
# =============================================================================
resources:
  jobs:

    setup_modular:
      name: "[${bundle.target}] Eval Engine - MODULAR Setup (registry + data)"
      tasks:
        - task_key: create_modular_config
          notebook_task:
            notebook_path: ../src/setup/01_create_modular_config.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      queue:
        enabled: true

    # ---- STANDARD per-study pipeline (shared; dispatchers run team-owned leaves) ----
    run_study_modular:
      name: "[${bundle.target}] Eval Engine - Run Study (standard)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_id, default: "M_ATT_001"}
        - {name: feature_nb, default: "feature_standard"}
        - {name: matching_nb, default: "matching_standard"}
        - {name: matching_method, default: "exact"}
        - {name: model_nb, default: "model_att"}
      tasks:
        - task_key: feature
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_feature.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", feature_nb: "{{job.parameters.feature_nb}}", config_table: "study_config_modular"}
        - task_key: quality_gate
          depends_on: [{task_key: feature}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.feature.values.quality_passed}}", right: "true"}
        - task_key: matching
          depends_on: [{task_key: quality_gate, outcome: "true"}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_matching.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", matching_nb: "{{job.parameters.matching_nb}}", matching_method: "{{job.parameters.matching_method}}"}
        - task_key: model
          depends_on: [{task_key: matching}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_model.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", model_nb: "{{job.parameters.model_nb}}", config_table: "study_config_modular"}
        - task_key: insights
          depends_on: [{task_key: model}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
      queue: {enabled: true}

    # ---- DEDICATED LME branch 1: mixed-effects (its own notebook trio) ----
    run_lme_mixed:
      name: "[${bundle.target}] Eval Engine - Run LME (mixed-effects)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_id, default: "M_LME_MIXED"}
      tasks:
        - task_key: feature_lme_mixed
          notebook_task:
            notebook_path: ../src/notebooks/registry/feature_lme_mixed.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: quality_gate
          depends_on: [{task_key: feature_lme_mixed}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.feature_lme_mixed.values.quality_passed}}", right: "true"}
        - task_key: matching_lme_mixed
          depends_on: [{task_key: quality_gate, outcome: "true"}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/matching_lme_mixed.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}"}
        - task_key: model_lme_mixed
          depends_on: [{task_key: matching_lme_mixed}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/model_lme_mixed.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: insights
          depends_on: [{task_key: model_lme_mixed}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
      queue: {enabled: true}

    # ---- DEDICATED LME branch 2: growth-curve (its own notebook trio) ----
    run_lme_growth:
      name: "[${bundle.target}] Eval Engine - Run LME (growth-curve)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_id, default: "M_LME_GROWTH"}
      tasks:
        - task_key: feature_lme_growth
          notebook_task:
            notebook_path: ../src/notebooks/registry/feature_lme_growth.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: quality_gate
          depends_on: [{task_key: feature_lme_growth}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.feature_lme_growth.values.quality_passed}}", right: "true"}
        - task_key: matching_lme_growth
          depends_on: [{task_key: quality_gate, outcome: "true"}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/matching_lme_growth.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}"}
        - task_key: model_lme_growth
          depends_on: [{task_key: matching_lme_growth}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/model_lme_growth.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: insights
          depends_on: [{task_key: model_lme_growth}]
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
      queue: {enabled: true}

    # ---- Top level: read config, then branch into the loop + each LME workstream ----
    eval_engine_modular:
      name: "[${bundle.target}] Eval Engine - MODULAR (branch: standard loop + LME workstreams)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
      tasks:
        - task_key: load_config_branched
          notebook_task:
            notebook_path: ../src/notebooks/registry/load_config_branched.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", config_table: "study_config_modular"}

        # Branch A: standard family -> shared for_each loop
        - task_key: branch_standard
          depends_on: [{task_key: load_config_branched}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.load_config_branched.values.has_standard}}", right: "true"}
        - task_key: run_standard_studies
          depends_on: [{task_key: branch_standard, outcome: "true"}]
          for_each_task:
            inputs: "{{tasks.load_config_branched.values.standard_studies}}"
            concurrency: 4
            task:
              task_key: run_standard
              run_job_task:
                job_id: ${resources.jobs.run_study_modular.id}
                job_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{input.study_id}}", feature_nb: "{{input.feature_nb}}", matching_nb: "{{input.matching_nb}}", matching_method: "{{input.matching_method}}", model_nb: "{{input.model_nb}}"}

        # Branch B: mixed-effects LME -> its own workstream
        - task_key: branch_lme_mixed
          depends_on: [{task_key: load_config_branched}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.load_config_branched.values.has_lme_mixed}}", right: "true"}
        - task_key: run_lme_mixed
          depends_on: [{task_key: branch_lme_mixed, outcome: "true"}]
          run_job_task:
            job_id: ${resources.jobs.run_lme_mixed.id}
            job_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}"}

        # Branch C: growth-curve LME -> its own workstream
        - task_key: branch_lme_growth
          depends_on: [{task_key: load_config_branched}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.load_config_branched.values.has_lme_growth}}", right: "true"}
        - task_key: run_lme_growth
          depends_on: [{task_key: branch_lme_growth, outcome: "true"}]
          run_job_task:
            job_id: ${resources.jobs.run_lme_growth.id}
            job_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}"}

      queue: {enabled: true}
