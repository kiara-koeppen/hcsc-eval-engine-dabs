# =============================================================================
# MODULAR / MULTI-TEAM TRACK  (NON-SERVERLESS / existing cluster)
# =============================================================================
# Same config-driven branch as resources/modular.job.yml (standard for_each loop +
# one dedicated branch per LME model), but every notebook task runs on an existing
# all-purpose cluster. Set it once via the `compute_cluster_id` bundle variable:
#
#   CID=0712-123456-abcde12
#   databricks bundle deploy                      -t dev --var="compute_cluster_id=$CID"
#   databricks bundle run setup_modular_cluster       -t dev --var="compute_cluster_id=$CID"
#   databricks bundle run eval_engine_modular_cluster -t dev --var="compute_cluster_id=$CID"
# =============================================================================
resources:
  jobs:

    setup_modular_cluster:
      name: "[${bundle.target}] Eval Engine - MODULAR Setup (cluster)"
      tasks:
        - task_key: create_modular_config
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/setup/01_create_modular_config.py
            base_parameters: {catalog: "${var.catalog}", schema: "${var.schema}"}
      queue: {enabled: true}

    run_study_modular_cluster:
      name: "[${bundle.target}] Eval Engine - Run Study (standard, cluster)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_id, default: "M_ATT_001"}
      tasks:
        - task_key: feature
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_feature.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: quality_gate
          depends_on: [{task_key: feature}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.feature.values.quality_passed}}", right: "true"}
        - task_key: matching
          depends_on: [{task_key: quality_gate, outcome: "true"}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_matching.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: model
          depends_on: [{task_key: matching}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_model.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular", job_run_id: "{{job.run_id}}"}
        - task_key: insights
          depends_on: [{task_key: model}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
      queue: {enabled: true}

    run_lme_mixed_cluster:
      name: "[${bundle.target}] Eval Engine - Run LME (mixed-effects, cluster)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_id, default: "M_LME_MIXED"}
      tasks:
        - task_key: feature_lme_mixed
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/feature_lme_mixed.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: quality_gate
          depends_on: [{task_key: feature_lme_mixed}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.feature_lme_mixed.values.quality_passed}}", right: "true"}
        - task_key: matching_lme_mixed
          depends_on: [{task_key: quality_gate, outcome: "true"}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/matching_lme_mixed.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}"}
        - task_key: model_lme_mixed
          depends_on: [{task_key: matching_lme_mixed}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/model_lme_mixed.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular", job_run_id: "{{job.run_id}}"}
        - task_key: insights
          depends_on: [{task_key: model_lme_mixed}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
      queue: {enabled: true}

    run_lme_growth_cluster:
      name: "[${bundle.target}] Eval Engine - Run LME (growth-curve, cluster)"
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_id, default: "M_LME_GROWTH"}
      tasks:
        - task_key: feature_lme_growth
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/feature_lme_growth.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
        - task_key: quality_gate
          depends_on: [{task_key: feature_lme_growth}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.feature_lme_growth.values.quality_passed}}", right: "true"}
        - task_key: matching_lme_growth
          depends_on: [{task_key: quality_gate, outcome: "true"}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/matching_lme_growth.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}"}
        - task_key: model_lme_growth
          depends_on: [{task_key: matching_lme_growth}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/model_lme_growth.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular", job_run_id: "{{job.run_id}}"}
        - task_key: insights
          depends_on: [{task_key: model_lme_growth}]
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{job.parameters.study_id}}", config_table: "study_config_modular"}
      queue: {enabled: true}

    eval_engine_modular_cluster:
      name: "[${bundle.target}] Eval Engine - MODULAR (branch, cluster)"
      email_notifications:
        on_failure:
          - ${var.notification_email}
      parameters:
        - {name: catalog, default: "${var.catalog}"}
        - {name: schema, default: "${var.schema}"}
        - {name: study_ids, default: ""}
      tasks:
        - task_key: load_config_branched
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/load_config_branched.py
            base_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", config_table: "study_config_modular", study_ids: "{{job.parameters.study_ids}}"}
        - task_key: branch_standard
          depends_on: [{task_key: load_config_branched}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.load_config_branched.values.has_standard}}", right: "true"}
        - task_key: run_standard_studies
          depends_on: [{task_key: branch_standard, outcome: "true"}]
          for_each_task:
            inputs: "{{tasks.load_config_branched.values.standard_studies}}"
            concurrency: 4
            task:
              task_key: run_standard
              run_job_task:
                job_id: ${resources.jobs.run_study_modular_cluster.id}
                job_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}", study_id: "{{input.study_id}}"}
        - task_key: branch_lme_mixed
          depends_on: [{task_key: load_config_branched}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.load_config_branched.values.has_lme_mixed}}", right: "true"}
        - task_key: run_lme_mixed
          depends_on: [{task_key: branch_lme_mixed, outcome: "true"}]
          run_job_task:
            job_id: ${resources.jobs.run_lme_mixed_cluster.id}
            job_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}"}
        - task_key: branch_lme_growth
          depends_on: [{task_key: load_config_branched}]
          condition_task: {op: "EQUAL_TO", left: "{{tasks.load_config_branched.values.has_lme_growth}}", right: "true"}
        - task_key: run_lme_growth
          depends_on: [{task_key: branch_lme_growth, outcome: "true"}]
          run_job_task:
            job_id: ${resources.jobs.run_lme_growth_cluster.id}
            job_parameters: {catalog: "{{job.parameters.catalog}}", schema: "{{job.parameters.schema}}"}
      queue: {enabled: true}
