# =============================================================================
# MODULAR / MULTI-TEAM TRACK  (NON-SERVERLESS / existing cluster)
# =============================================================================
# Identical pipeline to resources/modular.job.yml, but every notebook task runs
# on an EXISTING all-purpose cluster instead of serverless. Use this in
# workspaces where serverless is not enabled (HCSC today).
#
# Set the cluster once via the bundle variable `compute_cluster_id`:
#
#   databricks bundle deploy -t dev --var="compute_cluster_id=0712-123456-abcde12"
#   databricks bundle run setup_modular_cluster   -t dev --var="compute_cluster_id=0712-123456-abcde12"
#   databricks bundle run eval_engine_modular_cluster -t dev --var="compute_cluster_id=0712-123456-abcde12"
#
# Notes:
#   - Only notebook tasks take compute. condition_task, for_each_task, and
#     run_job_task have no cluster binding.
#   - The dispatchers use dbutils.notebook.run(), and those child notebook runs
#     execute on the SAME cluster as the dispatcher -- so no serverless needed
#     anywhere in the flow.
#   - This is exactly the "attach the existing cluster key to each task" step,
#     captured as code so you never hand-edit it per task or per environment.
# =============================================================================
resources:
  jobs:

    setup_modular_cluster:
      name: "[${bundle.target}] Eval Engine - MODULAR Setup (cluster)"
      tasks:
        - task_key: create_modular_config
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/setup/01_create_modular_config.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      queue:
        enabled: true

    run_study_modular_cluster:
      name: "[${bundle.target}] Eval Engine - Run Study (modular, cluster)"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: study_id
          default: "M_ATT_001"
        - name: feature_nb
          default: "feature_standard"
        - name: matching_nb
          default: "matching_standard"
        - name: matching_method
          default: "exact"
        - name: model_nb
          default: "model_att"

      tasks:
        - task_key: feature
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_feature.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              study_id: "{{job.parameters.study_id}}"
              feature_nb: "{{job.parameters.feature_nb}}"
              config_table: "study_config_modular"

        - task_key: quality_gate
          depends_on:
            - task_key: feature
          condition_task:
            op: "EQUAL_TO"
            left: "{{tasks.feature.values.quality_passed}}"
            right: "true"

        - task_key: matching
          depends_on:
            - task_key: quality_gate
              outcome: "true"
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_matching.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              study_id: "{{job.parameters.study_id}}"
              matching_nb: "{{job.parameters.matching_nb}}"
              matching_method: "{{job.parameters.matching_method}}"

        - task_key: model
          depends_on:
            - task_key: matching
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/dispatch_model.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              study_id: "{{job.parameters.study_id}}"
              model_nb: "{{job.parameters.model_nb}}"
              config_table: "study_config_modular"

        - task_key: insights
          depends_on:
            - task_key: model
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/insights_modular.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              study_id: "{{job.parameters.study_id}}"
              config_table: "study_config_modular"

      queue:
        enabled: true

    eval_engine_modular_cluster:
      name: "[${bundle.target}] Eval Engine - MODULAR (cluster)"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: load_config_modular
          existing_cluster_id: ${var.compute_cluster_id}
          notebook_task:
            notebook_path: ../src/notebooks/registry/load_config_modular.py
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              config_table: "study_config_modular"

        - task_key: run_all_studies
          depends_on:
            - task_key: load_config_modular
          for_each_task:
            inputs: "{{tasks.load_config_modular.values.studies}}"
            concurrency: 4
            task:
              task_key: run_study
              run_job_task:
                job_id: ${resources.jobs.run_study_modular_cluster.id}
                job_parameters:
                  catalog: "{{job.parameters.catalog}}"
                  schema: "{{job.parameters.schema}}"
                  study_id: "{{input.study_id}}"
                  feature_nb: "{{input.feature_nb}}"
                  matching_nb: "{{input.matching_nb}}"
                  matching_method: "{{input.matching_method}}"
                  model_nb: "{{input.model_nb}}"

      queue:
        enabled: true
